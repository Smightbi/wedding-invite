<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<meta name="description" content="کارت دعوت عروسی هانیه عابدیان و ایمان قطبی" />
<title>هانیه و ایمان-دعوت عروسی</title>
<link rel="preload" href="fonts/NotoNastaliqUrdu-Regular.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="fonts/B-NAZANIN.TTF" as="font" type="font/ttf" crossorigin>
<link rel="stylesheet" href="style.css" />
<noscript><style>
  .envelope-overlay, .sound-toggle { display: none; }
  .invitation { opacity: 1; transform: none; }
  .invitation__bg, .invitation__frame, .reveal { opacity: 1; transform: none; animation: none; }
</style></noscript>
</head>
<body>

<audio id="bgAudio" loop preload="auto">
  <source src="assets/song.mp3" type="audio/mpeg">
</audio>

<button type="button" id="soundToggle" class="sound-toggle" aria-label="قطع صدا" aria-pressed="false">
  <span class="sound-toggle__icon sound-toggle__icon--on" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 9.5V14.5H7.5L12.5 18.5V5.5L7.5 9.5H4Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M16 8.5C17.1 9.5 17.5 10.5 17.5 12C17.5 13.5 17.1 14.5 16 15.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M18.6 6C20.5 7.8 21.3 9.8 21.3 12C21.3 14.2 20.5 16.2 18.6 18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </span>
  <span class="sound-toggle__icon sound-toggle__icon--off" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 9.5V14.5H7.5L12.5 18.5V5.5L7.5 9.5H4Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M16.5 9.5L20.5 13.5M20.5 9.5L16.5 13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </span>
</button>

<div class="envelope-overlay" id="envelopeOverlay" role="button" tabindex="0" aria-label="برای گشودن دعوت‌نامه لمس کنید">
  <div class="envelope">
    <div class="envelope__pocket"></div>
    <div class="envelope__flap"></div>
    <div class="envelope__seal">
      <span>ه</span><span class="envelope__seal-amp">&amp;</span><span>ا</span>
    </div>
  </div>
  <p class="envelope-hint" aria-hidden="true">برای گشودن دعوت‌نامه ضربه بزنید</p>
</div>

<div class="stage">
  <main class="invitation" id="invitation" aria-label="کارت دعوت عروسی">
    <div class="invitation__bg" aria-hidden="true"></div>
    <div class="invitation__frame" aria-hidden="true"></div>

    <div class="invitation__content">

      <header class="poem-names-wrap">
        <p class="poem reveal" data-reveal="1">
          <span>در من بدمی من زنده شوم</span>
          <span>یک جان چه بود، صد جان منی</span>
        </p>

        <h1 class="names reveal" data-reveal="2">
          <span class="name name--big">هانیه</span>
          <span class="name name--and">و</span>
          <span class="name name--big">ایمان</span>
        </h1>
      </header>

      <section class="body-block reveal" data-reveal="3">
        <p class="invite-text">با حضور پرمهرتان در آغاز زندگی مشترک عزیزانمان شادی‌بخش محفل ما باشید.
        </p>
      </section>
      
      <section class="family-names-block reveal" data-reveal="3">
        <p class="invite-text family-names">عابدیان ، قطبی</p>
      </section>
<!-- ============================================================
     Schedule — 2-column grid (details | date & year)
     ============================================================ -->
<div class="schedule reveal" data-reveal="4">
  
  <!-- Column 1: Time Details (عقد و شام) -->
  <div class="schedule__col schedule__col--details">
    <div class="schedule__detail">
      <span class="schedule__label">عقد</span>
      <span class="schedule__time">۱۷ - ۱۹</span>
    </div>
    <div class="schedule__detail">
      <span class="schedule__label">شام</span>
      <span class="schedule__time">۱۹ - ۲۳</span>
    </div>
  </div>

  <!-- Column 2: Day, Month, and Year Stacked vertically -->
  <div class="schedule__col schedule__col--date">
    <span class="schedule__day">شنبه</span>
    <span class="schedule__daymonth">۳۱ مرداد</span>
    <span class="schedule__year">۱۴۰۵</span>
  </div>

</div>

      <section class="location-block reveal" data-reveal="5">
        <a class="location-btn"
           href="https://maps.app.goo.gl/UAro2598s8evqank8"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="مشاهده مکان مراسم در نقشه">
          <span class="location-btn__ring" aria-hidden="true"></span>
          <span class="location-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 21.5C12 21.5 19.5 14.9036 19.5 9.5C19.5 5.35786 16.1421 2 12 2C7.85786 2 4.5 5.35786 4.5 9.5C4.5 14.9036 12 21.5 12 21.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              <circle cx="12" cy="9.5" r="2.75" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          </span>
          <span class="location-btn__text">
            <strong>مکان برگزاری مراسم</strong>
            <small>برای مسیریابی ضربه بزنید</small>
          </span>
          <span class="location-btn__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>
      </section>

    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
